# Build the Vite app and publish it to GitHub Pages.
#
# This repo's root IS the app, so no working-directory indirection is needed.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY   (the anon key is safe to expose)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      # `npm install` (not `npm ci`): the committed lock can carry esbuild's
      # platform-specific optional binaries flagged in a way that makes the strict
      # `npm ci` choke on Linux (EBADPLATFORM on @esbuild/*-{netbsd,…}). `npm install`
      # reconciles and skips the non-matching optionals. CI only builds, so this is safe.
      - run: npm install --no-audit --no-fund
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
